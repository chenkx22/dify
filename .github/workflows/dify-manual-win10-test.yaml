name: Manual Test Win10 Version

# Manual trigger test workflow
on:
  workflow_dispatch:
    inputs:
      test-type:
        description: 'Test Type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - api-only
          - web-only
      test-environment:
        description: 'Test Environment'
        required: false
        default: 'development'
        type: string

concurrency:
  group: manual-test-win10-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  packages: write
  actions: read

jobs:
  # API Test Job
  api-test:
    name: API Tests on Win10
    runs-on: windows-latest
    if: ${{ github.event.inputs.test-type == 'full' || github.event.inputs.test-type == 'api-only' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup UV and Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false
          python-version: "3.12"
          cache-dependency-glob: api/uv.lock

      - name: Install API dependencies
        run: uv sync --project api --dev

      - name: Run API Unit Tests
        shell: pwsh
        run: ./dev/pytest/pytest_unit_tests.ps1
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: API Test Results Log
        if: always()
        run: 'echo "API Tests completed on Win10 with status: ${{ job.status }}"'

  # Web Test Job
  web-test:
    name: Web Tests on Win10
    runs-on: windows-latest
    if: ${{ github.event.inputs.test-type == 'full' || github.event.inputs.test-type == 'web-only' }}

    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Web dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web Type Checks
        run: pnpm type-check
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Run Web Lint Checks
        run: pnpm lint
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Run Web Unit Tests
        run: pnpm test
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Web Test Results Log
        if: always()
        run: 'echo "Web Tests completed on Win10 with status: ${{ job.status }}"'

  # Build Package Job - API
  build-api-package:
    name: Build API Package for Win10
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup UV and Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false
          python-version: "3.12"
          cache-dependency-glob: api/uv.lock

      - name: Install API dependencies
        run: uv sync --project api --dev

      - name: Package API code and dependencies
        run: |
          # Create package directories
          mkdir -p ./api-package/api
          mkdir -p ./api-package/dependencies

          # Copy API code
          cp -r ./api/* ./api-package/api/

          # Copy dependencies
          cp -r ./api/.venv ./api-package/dependencies/

          # Copy necessary scripts
          cp ./dev/pytest/pytest_unit_tests.ps1 ./api-package/
          cp ./dev/basedpyright-check.ps1 ./api-package/

          # Create README file
          echo "# Dify API Win10 Test Package" > ./api-package/README.md
          echo "Manual test package for Dify API on Windows 10" >> ./api-package/README.md
          echo "" >> ./api-package/README.md
          echo "## Usage" >> ./api-package/README.md
          echo "1. Extract the package" >> ./api-package/README.md
          echo "2. Run tests using: ./pytest_unit_tests.ps1" >> ./api-package/README.md

      - name: Create API ZIP package
        run: |
          Compress-Archive -Path ./api-package/* -DestinationPath ./dify-api-win10-test-package-${{ github.run_id }}.zip

      - name: Upload API Package to GitHub
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: dify-api-win10-test-package
          path: ./dify-api-win10-test-package-${{ github.run_id }}.zip
          retention-days: 30

  # Build Package Job - Web
  build-web-package:
    name: Build Web Package for Win10
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./web

      - name: Package Web code and dependencies
        run: |
          # Create package directories
          mkdir -p ./web-package/web
          mkdir -p ./web-package/dependencies

          # Copy Web code
          cp -r ./web/* ./web-package/web/

          # Copy dependencies
          cp -r ./web/node_modules ./web-package/dependencies/

          # Create README file
          echo "# Dify Web Win10 Test Package" > ./web-package/README.md
          echo "Manual test package for Dify Web on Windows 10" >> ./web-package/README.md
          echo "" >> ./web-package/README.md
          echo "## Usage" >> ./web-package/README.md
          echo "1. Extract the package" >> ./web-package/README.md
          echo "2. Run tests using: npm test" >> ./web-package/README.md

      - name: Create Web ZIP package
        run: |
          Compress-Archive -Path ./web-package/* -DestinationPath ./dify-web-win10-test-package-${{ github.run_id }}.zip

      - name: Upload Web Package to GitHub
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: dify-web-win10-test-package
          path: ./dify-web-win10-test-package-${{ github.run_id }}.zip
          retention-days: 30

  # Test Summary Job
  test-summary:
    name: Test Summary
    runs-on: windows-latest
    needs: [api-test, web-test, build-api-package, build-web-package]
    if: always()

    steps:
      - name: Output Test Summary
        run: |
          echo "========================================"
          echo "Manual Test Win10 Version - Results Summary"
          echo "========================================"
          echo "Test Type: ${{ github.event.inputs.test-type }}"
          echo "Test Environment: ${{ github.event.inputs.test-environment }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "API Tests Status: ${{ needs.api-test.result }}"
          echo "Web Tests Status: ${{ needs.web-test.result }}"
          echo "API Package Build: ${{ needs.build-api-package.result }}"
          echo "Web Package Build: ${{ needs.build-web-package.result }}"
          echo "========================================"

          # Check if all tests passed
          if [ "${{ needs.api-test.result }}" == "success" ] && [ "${{ needs.web-test.result }}" == "success" ]; then
            echo "All tests passed!"
            exit 0
          elif [ "${{ needs.api-test.result }}" == "skipped" ] && [ "${{ needs.web-test.result }}" == "skipped" ]; then
            echo "All tests were skipped."
            exit 0
          else
            echo "Some tests failed!"
            exit 1
          fi
