name: Manual Test Win10 Version

on:
  workflow_dispatch:
    inputs:
      test-type:
        description: '测试类型'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - api-only
          - web-only
      test-environment:
        description: '测试环境'
        required: false
        default: 'development'
        type: string

concurrency:
  group: manual-test-win10-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  packages: write
  actions: read

jobs:
  api-test:
    name: API Tests on Win10
    runs-on: windows-latest
    if: ${{ github.event.inputs.test-type == 'full' || github.event.inputs.test-type == 'api-only' }}
    defaults:
      run:
        working-directory: ./api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup UV and Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Install API dependencies
        run: uv sync --project api --dev

      - name: Run API Type Checks
        run: uv run basedpyright
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Run API Unit Tests
        run: uv run pytest tests/unit
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: API Test Results Log
        if: always()
        run: echo "API Tests completed on Win10 with status: ${{ job.status }}"

  web-test:
    name: Web Tests on Win10
    runs-on: windows-latest
    if: ${{ github.event.inputs.test-type == 'full' || github.event.inputs.test-type == 'web-only' }}
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Web dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web Type Checks
        run: pnpm type-check
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Run Web Lint Checks
        run: pnpm lint
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Run Web Unit Tests
        run: pnpm test
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.test-environment }}

      - name: Web Test Results Log
        if: always()
        run: echo "Web Tests completed on Win10 with status: ${{ job.status }}"

  build-api-package:
    name: Build API Package for Win10
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with: { python-version: "3.12" }
      - name: Install deps
        run: uv sync --project api --dev
      - name: Package
        run: |
          New-Item -ItemType Directory -Force ./api-package/api,./api-package/dependencies
          Copy-Item -Recurse ./api/* ./api-package/api/
          Copy-Item -Recurse ./api/.venv ./api-package/dependencies/
          echo "# API Package" > ./api-package/README.md
      - name: Zip
        run: Compress-Archive -Path ./api-package/* -DestinationPath api-package.zip
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: api-package.zip

  build-web-package:
    name: Build Web Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
        working-directory: ./web
      - run: |
          New-Item -ItemType Directory -Force ./web-package
          Copy-Item -Recurse ./web/* ./web-package/
        working-directory: ./
      - run: Compress-Archive -Path ./web-package/* -DestinationPath web-package.zip
      - uses: actions/upload-artifact@v4
        with:
          name: web-package
          path: web-package.zip

  test-summary:
    name: Test Summary
    runs-on: windows-latest
    needs: [api-test, web-test, build-api-package, build-web-package]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Test Type: ${{ github.event.inputs.test-type }}"
          echo "API: ${{ needs.api-test.result }}"
          echo "Web: ${{ needs.web-test.result }}"
